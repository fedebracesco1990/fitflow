version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: fitflow-mysql
    restart: unless-stopped
    cap_add:
      - SYS_NICE
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword123
      MYSQL_DATABASE: fit_flow_db
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpassword123
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
      # :ro = read-only para seguridad
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - app-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-prootpassword123']
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
    driver: local
    name: fitflow_mysql_data

networks:
  app-network:
    driver: bridge
    name: fitflow_network
