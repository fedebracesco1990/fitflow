<fit-flow-card>
  <div class="filters-container">
    <h3>Filtros</h3>
    <div class="filters-grid">
      <div class="filter-field">
        <label for="startDate">Fecha Inicio</label>
        <input type="date" id="startDate" [(ngModel)]="startDate" class="date-input" />
      </div>
      <div class="filter-field">
        <label for="endDate">Fecha Fin</label>
        <input type="date" id="endDate" [(ngModel)]="endDate" class="date-input" />
      </div>
    </div>
    <div class="filters-actions">
      <fit-flow-button variant="primary" (click)="applyFilters()">
        Aplicar Filtros
      </fit-flow-button>
      <fit-flow-button variant="secondary" (click)="clear()"> Limpiar </fit-flow-button>
    </div>
  </div>
</fit-flow-card>
