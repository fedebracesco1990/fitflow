<div class="behavior-metrics">
  <fit-flow-card padding="md" class="metric-card">
    <div class="metric-icon">✅</div>
    <div class="metric-content">
      <h3>Visitas Prom. (Activos)</h3>
      <p class="metric-value">{{ visitasPromActivos }}</p>
      <span class="metric-label">visitas por miembro</span>
    </div>
  </fit-flow-card>

  <fit-flow-card padding="md" class="metric-card">
    <div class="metric-icon">⚠️</div>
    <div class="metric-content">
      <h3>Visitas Prom. (Morosos)</h3>
      <p class="metric-value">{{ visitasPromMorosos }}</p>
      <span class="metric-label">visitas por miembro</span>
    </div>
  </fit-flow-card>

  <fit-flow-card padding="md" class="metric-card">
    <div class="metric-icon">💪</div>
    <div class="metric-content">
      <h3>Rutinas Activas</h3>
      <p class="metric-value">{{ rutinasActivas }}</p>
      <span class="metric-label">rutinas asignadas</span>
    </div>
  </fit-flow-card>
</div>
