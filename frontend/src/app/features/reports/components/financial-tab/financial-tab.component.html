<div class="financial-tab">
  <fit-flow-month-year-filter
    (filtersApplied)="onFiltersApplied($event)"
  ></fit-flow-month-year-filter>

  @if (loading()) {
    <div class="loading-container">
      <fit-flow-loading-spinner></fit-flow-loading-spinner>
    </div>
  } @else if (error()) {
    <fit-flow-alert [message]="error()!" type="error"></fit-flow-alert>
  } @else if (report()) {
    <div class="metrics-grid">
      <fit-flow-card padding="md" class="metric-card">
        <div class="metric-icon">💰</div>
        <div class="metric-content">
          <h3>Ingreso Total</h3>
          <p class="metric-value">{{ formatCurrency(report()!.ingresoTotal) }}</p>
        </div>
      </fit-flow-card>

      <fit-flow-card padding="md" class="metric-card">
        <div class="metric-icon">📊</div>
        <div class="metric-content">
          <h3>Transacciones</h3>
          <p class="metric-value">{{ report()!.transacciones }}</p>
        </div>
      </fit-flow-card>

      <fit-flow-card padding="md" class="metric-card">
        <div class="metric-icon">⚠️</div>
        <div class="metric-content">
          <h3>Morosos Actuales</h3>
          <p class="metric-value" [class.alert]="report()!.morososActuales > 0">
            {{ report()!.morososActuales }}
          </p>
        </div>
      </fit-flow-card>
    </div>

    <fit-flow-card padding="md" class="transactions-card">
      <h3>Desglose de Transacciones</h3>
      <fit-flow-transactions-table
        [transactions]="report()!.desglose"
      ></fit-flow-transactions-table>
    </fit-flow-card>
  }
</div>
