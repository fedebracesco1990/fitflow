@if (history().length > 0) {
  <div class="history-section">
    <div class="history-header">
      <h3>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
        Reportes Generados Recientemente
      </h3>
      <button class="clear-btn" (click)="clearHistory()">Limpiar historial</button>
    </div>

    <div class="history-table-wrapper">
      <table class="history-table">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Formato</th>
            <th>Período</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody>
          @for (item of history(); track item.id) {
            <tr>
              <td class="date-cell">{{ formatDate(item.generatedAt) }}</td>
              <td>
                <span class="type-badge" [attr.data-type]="item.type">
                  {{ typeLabels[item.type] }}
                </span>
              </td>
              <td>
                <span class="format-badge" [attr.data-format]="item.format">
                  {{ formatLabels[item.format] }}
                </span>
              </td>
              <td class="period-cell">{{ formatDateRange(item) }}</td>
              <td>
                <button
                  class="regenerate-btn"
                  (click)="regenerateReport(item)"
                  title="Regenerar reporte"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                  </svg>
                  Regenerar
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}
