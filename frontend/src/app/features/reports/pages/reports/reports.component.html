<div class="reports-page">
  <header class="page-header">
    <div class="header-content">
      <div>
        <h1>Centro de Reportes</h1>
        <p class="subtitle">Análisis financiero y de comportamiento de miembros</p>
      </div>
      <fit-flow-button
        variant="secondary"
        [disabled]="isExporting()"
        (click)="exportToCsv()"
      >
        {{ isExporting() ? 'Exportando...' : 'Exportar CSV' }}
      </fit-flow-button>
    </div>
  </header>

  @if (exportError()) {
    <fit-flow-alert [message]="exportError()!" type="error"></fit-flow-alert>
  }

  <div class="reports-content">
    <div class="tabs-header">
      <button
        class="tab-button"
        [class.active]="activeTab() === 'financial'"
        (click)="setActiveTab('financial')"
      >
        Financiero
      </button>
      <button
        class="tab-button"
        [class.active]="activeTab() === 'behavior'"
        (click)="setActiveTab('behavior')"
      >
        Uso y Comportamiento
      </button>
    </div>

    <div class="tab-content">
      @if (activeTab() === 'financial') {
        <fit-flow-financial-tab></fit-flow-financial-tab>
      }

      @if (activeTab() === 'behavior') {
        <fit-flow-behavior-tab></fit-flow-behavior-tab>
      }
    </div>
  </div>
</div>
