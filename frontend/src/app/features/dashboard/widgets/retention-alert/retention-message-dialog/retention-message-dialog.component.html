@if (isOpen()) {
  <div
    class="dialog-backdrop"
    (click)="onBackdropClick($event)"
    (keydown.escape)="onClose()"
    tabindex="-1"
  >
    <div class="dialog" role="dialog" aria-modal="true">
      <div class="dialog-header">
        <div class="header-content">
          <lucide-icon name="message-circle" [size]="20"></lucide-icon>
          <h3>Enviar mensaje a {{ userName() }}</h3>
        </div>
        <button class="close-btn" (click)="onClose()" type="button">
          <lucide-icon name="x" [size]="18"></lucide-icon>
        </button>
      </div>

      @if (success()) {
        <div class="dialog-body success-state">
          <lucide-icon name="check-circle" [size]="48"></lucide-icon>
          <span>¡Notificación enviada!</span>
        </div>
      } @else {
        <div class="dialog-body">
          <div class="form-group">
            <label for="title">Título</label>
            <input
              id="title"
              type="text"
              [ngModel]="title()"
              (ngModelChange)="title.set($event)"
              placeholder="Ej: Te extrañamos en el gym"
              [disabled]="sending()"
            />
          </div>

          <div class="form-group">
            <label for="body">Mensaje</label>
            <textarea
              id="body"
              [ngModel]="body()"
              (ngModelChange)="body.set($event)"
              placeholder="Escribe tu mensaje aquí..."
              rows="4"
              [disabled]="sending()"
            ></textarea>
          </div>

          @if (error()) {
            <div class="error-message">
              <lucide-icon name="alert-circle" [size]="16"></lucide-icon>
              <span>{{ error() }}</span>
            </div>
          }
        </div>

        <div class="dialog-footer">
          <fit-flow-button variant="outline" (click)="onClose()" [disabled]="sending()">
            Cancelar
          </fit-flow-button>
          <fit-flow-button
            variant="primary"
            (click)="onSend()"
            [disabled]="!canSend"
            [loading]="sending()"
          >
            @if (sending()) {
              Enviando...
            } @else {
              Enviar notificación
            }
          </fit-flow-button>
        </div>
      }
    </div>
  </div>
}
