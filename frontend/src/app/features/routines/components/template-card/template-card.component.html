<fit-flow-card class="template-card">
  <div class="card-header">
    <h3 class="template-name">{{ template().name }}</h3>
    <fit-flow-badge variant="primary">
      {{ getCategoryLabel($any(template()).templateCategory) }}
    </fit-flow-badge>
  </div>

  @if (template().description) {
    <p class="template-description">{{ template().description }}</p>
  }

  <div class="template-stats">
    <span class="stat">
      <span class="stat-value">{{ template().exercises?.length || 0 }}</span>
      <span class="stat-label">ejercicios</span>
    </span>
    <span class="stat">
      <span class="stat-value">{{ template().estimatedDuration || 0 }}</span>
      <span class="stat-label">min</span>
    </span>
    <fit-flow-badge [variant]="getDifficultyVariant(template().difficulty)">
      {{ difficultyLabels[template().difficulty] }}
    </fit-flow-badge>
  </div>

  <div class="card-actions">
    <button class="btn btn-outline btn-sm" (click)="onPreview()">Ver detalle</button>
    <button class="btn btn-primary btn-sm" (click)="onUse()">Usar</button>
  </div>
</fit-flow-card>
