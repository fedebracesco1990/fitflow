@if (isOpen()) {
  <div
    class="dialog-backdrop"
    (click)="onBackdropClick($event)"
    (keydown.escape)="onCancel()"
    tabindex="-1"
  >
    <div class="dialog" role="dialog" aria-modal="true">
      <div class="dialog-header">
        <h3>Guardar como Plantilla</h3>
      </div>
      <div class="dialog-body">
        <p class="description">
          Esta rutina se guardará como plantilla reutilizable. Selecciona una categoría para
          organizarla.
        </p>

        <div class="form-group">
          <label for="templateCategory">Categoría *</label>
          <select
            id="templateCategory"
            [ngModel]="selectedCategory()"
            (ngModelChange)="selectedCategory.set($event)"
          >
            @for (cat of categories; track cat) {
              <option [value]="cat">{{ categoryLabels[cat] }}</option>
            }
          </select>
        </div>

        <div class="form-group">
          <label for="templateName">Nombre de la plantilla (opcional)</label>
          <input
            id="templateName"
            type="text"
            [ngModel]="customName()"
            (ngModelChange)="customName.set($event)"
            [placeholder]="routineName() + ' (plantilla)'"
          />
          <span class="hint">Dejar vacío para usar el nombre original</span>
        </div>
      </div>
      <div class="dialog-footer">
        <fit-flow-button variant="outline" (click)="onCancel()" [disabled]="saving()">
          Cancelar
        </fit-flow-button>
        <fit-flow-button variant="primary" (click)="onConfirm()" [disabled]="saving()">
          {{ saving() ? 'Guardando...' : 'Guardar Plantilla' }}
        </fit-flow-button>
      </div>
    </div>
  </div>
}
