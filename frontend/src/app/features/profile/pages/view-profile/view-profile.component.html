<div class="profile-page">
  <div class="profile-header">
    <h1>Mi Perfil</h1>
    <a routerLink="edit">
      <fit-flow-button variant="outline">Editar perfil</fit-flow-button>
    </a>
  </div>

  @if (isLoading()) {
    <div class="loading">
      <fit-flow-loading-spinner size="lg" />
    </div>
  } @else if (profile()) {
    <fit-flow-card padding="lg">
      <div class="profile-content">
        <fit-flow-avatar [name]="profileName()" size="xl" />

        <div class="profile-info">
          <div class="info-group">
            <span class="info-label">Nombre</span>
            <p>{{ profile()?.name }}</p>
          </div>

          <div class="info-group">
            <span class="info-label">Correo electrónico</span>
            <p>{{ profile()?.email }}</p>
          </div>

          <div class="info-group">
            <span class="info-label">Rol</span>
            <p>
              <fit-flow-badge [variant]="roleBadgeVariant()">{{ roleLabel() }}</fit-flow-badge>
            </p>
          </div>

          <div class="info-group">
            <span class="info-label">Miembro desde</span>
            <p>{{ formattedDate() }}</p>
          </div>
        </div>
      </div>
    </fit-flow-card>

    <fit-flow-card padding="md" class="security-section">
      <h2>Seguridad</h2>
      <a routerLink="change-password">
        <fit-flow-button variant="secondary">Cambiar contraseña</fit-flow-button>
      </a>
    </fit-flow-card>
  }
</div>
