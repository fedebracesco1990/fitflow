<div class="edit-profile-page">
  <div class="page-header">
    <a routerLink="/profile" class="back-link">← Volver</a>
    <h1>Editar Perfil</h1>
  </div>

  @if (error()) {
    <fit-flow-alert type="error" [message]="error()!" />
  }

  @if (successMessage()) {
    <fit-flow-alert type="success" [message]="successMessage()!" />
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="edit-form">
    <div class="form-group">
      <label for="name">Nombre completo</label>
      <input
        type="text"
        id="name"
        formControlName="name"
        placeholder="Tu nombre"
        [class.error]="nameInvalid"
      />
      @if (nameInvalid) {
        <span class="error-text">El nombre debe tener al menos 2 caracteres</span>
      }
    </div>

    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="tu@email.com"
        [class.error]="emailInvalid"
      />
      @if (emailInvalid) {
        <span class="error-text">Ingresa un correo válido</span>
      }
    </div>

    <div class="form-actions">
      <a routerLink="/profile">
        <fit-flow-button variant="secondary">Cancelar</fit-flow-button>
      </a>
      <fit-flow-button type="submit" [loading]="isLoading()" [disabled]="isSubmitDisabled">
        Guardar cambios
      </fit-flow-button>
    </div>
  </form>
</div>
