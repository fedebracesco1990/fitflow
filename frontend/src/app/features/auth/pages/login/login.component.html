<div class="login-page">
  <h2>Iniciar Sesión</h2>

  @if (error()) {
    <div class="alert alert-error">
      {{ error() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="tu@email.com"
        [class.error]="isFieldInvalid('email')"
      />
      @if (isFieldInvalid('email')) {
        <span class="error-text">Ingresa un correo válido</span>
      }
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        placeholder="••••••••"
        [class.error]="isFieldInvalid('password')"
      />
      @if (isFieldInvalid('password')) {
        <span class="error-text">La contraseña es requerida</span>
      }
    </div>

    <div class="form-actions">
      <a routerLink="/forgot-password" class="forgot-link">¿Olvidaste tu contraseña?</a>
    </div>

    <button type="submit" class="btn-primary" [disabled]="isLoading() || form.invalid">
      @if (isLoading()) {
        <span>Cargando...</span>
      } @else {
        <span>Iniciar Sesión</span>
      }
    </button>
  </form>

  <div class="register-link">
    <span>¿No tienes cuenta?</span>
    <a routerLink="/register">Regístrate</a>
  </div>
</div>
