<div class="login-page">
  <h2>Iniciar Sesión</h2>

  @if (error()) {
    <fit-flow-alert type="error" [message]="error()!" />
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="email">Correo electrónico</label>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="tu@email.com"
        [class.error]="emailInvalid"
      />
      @if (emailInvalid) {
        <span class="error-text">Ingresa un correo válido</span>
      }
    </div>

    <div class="form-group">
      <label for="password">Contraseña</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        placeholder="••••••••"
        autocomplete="current-password"
        [class.error]="passwordInvalid"
      />
      @if (passwordInvalid) {
        <span class="error-text">La contraseña es requerida</span>
      }
    </div>

    <div class="form-actions">
      <a routerLink="/forgot-password" class="forgot-link">¿Olvidaste tu contraseña?</a>
    </div>

    <fit-flow-button
      type="submit"
      [fullWidth]="true"
      [loading]="isLoading()"
      [disabled]="isSubmitDisabled"
    >
      Iniciar Sesión
    </fit-flow-button>
  </form>
</div>
