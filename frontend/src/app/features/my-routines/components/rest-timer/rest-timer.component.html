@if (isActive()) {
  <div class="rest-timer-overlay">
    <div class="rest-timer-content">
      <div class="icon-container">
        <div class="icon-circle">
          <span class="clock-icon">🕐</span>
        </div>
      </div>

      <h1 class="title">¡Descansa!</h1>
      <p class="subtitle">Tómate un respiro antes de la siguiente serie</p>

      <div class="timer-card">
        <div class="timer-value">{{ formattedTime }}</div>
        <div class="timer-label">Tiempo restante</div>
      </div>

      <button type="button" class="skip-btn" (click)="onSkip()">
        <span class="skip-icon">⏩</span>
        Saltar
      </button>
    </div>
  </div>
}
