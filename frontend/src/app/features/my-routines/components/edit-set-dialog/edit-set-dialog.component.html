@if (isOpen()) {
  <div
    class="dialog-backdrop"
    (click)="onBackdropClick($event)"
    (keydown.escape)="onCancel()"
    tabindex="-1"
  >
    <div class="dialog" role="dialog" aria-modal="true">
      <div class="dialog-header">
        <h3>Editar Set {{ setNumber() }}</h3>
        <button type="button" class="close-btn" (click)="onCancel()">×</button>
      </div>

      <div class="dialog-body">
        <div class="input-columns">
          <div class="input-column">
            <label class="input-label">REPETICIONES</label>
            <button type="button" class="arrow-btn" (click)="incrementReps()">
              <span class="arrow">↑</span>
            </button>
            <div class="value-display">{{ reps() }}</div>
            <button type="button" class="arrow-btn" (click)="decrementReps()">
              <span class="arrow">↓</span>
            </button>
          </div>

          <div class="input-column">
            <label class="input-label">PESO (KG)</label>
            <button type="button" class="arrow-btn" (click)="incrementWeight()">
              <span class="arrow">↑</span>
            </button>
            <div class="value-display">{{ weight() }}</div>
            <button type="button" class="arrow-btn" (click)="decrementWeight()">
              <span class="arrow">↓</span>
            </button>
          </div>
        </div>
      </div>

      <div class="dialog-footer">
        <fit-flow-button variant="outline" (click)="onCancel()">Cancelar</fit-flow-button>
        <fit-flow-button variant="primary" (click)="onSave()">Aceptar</fit-flow-button>
      </div>
    </div>
  </div>
}
