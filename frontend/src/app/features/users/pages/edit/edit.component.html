<div class="user-edit-page">
  <div class="page-header">
    <a [routerLink]="['/users', userId()]" class="back-link">← Volver</a>
    <h1>Editar Usuario</h1>
  </div>

  @if (error()) {
    <fit-flow-alert type="error" [message]="error()!" />
  }

  @if (isLoading()) {
    <div class="loading">
      <p>Cargando...</p>
    </div>
  } @else {
    <fit-flow-card>
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
          <label for="name">Nombre completo *</label>
          <input
            type="text"
            id="name"
            formControlName="name"
            placeholder="Nombre del usuario"
            [class.error]="nameInvalid"
          />
          @if (nameInvalid) {
            <span class="error-text">El nombre debe tener al menos 2 caracteres</span>
          }
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico *</label>
          <input
            type="email"
            id="email"
            formControlName="email"
            placeholder="usuario@email.com"
            [class.error]="emailInvalid"
          />
          @if (emailInvalid) {
            <span class="error-text">Ingresa un correo válido</span>
          }
        </div>

        <div class="form-group">
          <label for="role">Rol *</label>
          <select id="role" formControlName="role" [class.error]="roleInvalid">
            @for (role of roles; track role.value) {
              <option [value]="role.value">{{ role.label }}</option>
            }
          </select>
          @if (roleInvalid) {
            <span class="error-text">Selecciona un rol</span>
          }
        </div>

        <div class="form-group checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" formControlName="isActive" />
            <span>Usuario activo</span>
          </label>
        </div>

        <div class="form-actions">
          <a [routerLink]="['/users', userId()]">
            <fit-flow-button variant="outline" type="button">Cancelar</fit-flow-button>
          </a>
          <fit-flow-button type="submit" [loading]="isSaving()" [disabled]="isSubmitDisabled()">
            Guardar Cambios
          </fit-flow-button>
        </div>
      </form>
    </fit-flow-card>
  }
</div>
