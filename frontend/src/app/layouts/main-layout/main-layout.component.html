<div class="main-layout" [class.sidebar-collapsed]="sidebarCollapsed()">
  <!-- Sidebar -->
  <fit-flow-sidebar
    [collapsed]="sidebarCollapsed()"
    [mobileOpen]="mobileMenuOpen()"
    [menuItems]="menuItems()"
    [user]="sidebarUser()"
    (toggleCollapse)="toggleSidebar()"
    (closeMobile)="closeMobileMenu()"
    (logoutClick)="logout()"
  ></fit-flow-sidebar>

  <!-- Main Content Area -->
  <div class="main-content-wrapper">
    <!-- Mobile Header -->
    <header class="mobile-header">
      <button class="hamburger-btn" (click)="toggleMobileMenu()">
        <lucide-icon name="menu" [size]="24"></lucide-icon>
      </button>
      <span class="mobile-logo">FitFlow</span>
      <div class="header-actions">
        <div class="notification-wrapper">
          <fit-flow-notification-bell (bellClick)="toggleNotificationCenter()" />
          <fit-flow-notification-center
            [isOpen]="notificationCenterOpen()"
            (closePanel)="closeNotificationCenter()"
          />
        </div>
      </div>
    </header>

    <!-- Notification Prompt -->
    <fit-flow-notification-prompt
      [isVisible]="showNotificationPrompt()"
      (dismissed)="dismissNotificationPrompt()"
    />

    <!-- PR Celebration Modal -->
    <fit-flow-pr-celebration-modal />

    <!-- Main Content -->
    <main class="main-content">
      <router-outlet />
    </main>

    <!-- Footer -->
    <footer class="footer">
      <p>&copy; 2025 FitFlow. Todos los derechos reservados.</p>
    </footer>
  </div>
</div>
